<!DOCTYPE html>
<!-- NekoUI 配置面板 -->
<html lang="zh_CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>NekoUI 管理设置</title>
    <link rel="stylesheet" href="style.css">
    <!-- 字体引入，如果有需要 -->
</head>
<body>
    <header class="navbar">
        <h1>NekoUI 配置</h1>
        <div class="controls-group">
            <!-- Language Selector (语言选择器) -->
            <div class="control-item language-selector">
                <label for="locale-select">语言:</label>
                <select id="locale-select"></select>
            </div>
            <!-- Theme Toggle (主题切换按钮) -->
            <button id="theme-toggle" aria-label="切换主题">🌙</button>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <h2>配置模块</h2>
            <nav>
                <!-- 侧边栏导航，每个li代表一个不同的配置区域 -->
                <ul>
                    <li><a href="#" data-module="general" role="button">通用设置</a></li>
                    <li><a href="#" data-module="screen_elements" role="button">界面元素 (Screen)</a></li>
                    <li><a href="#" data-module="menu_pages" role="button">菜单页面 (Menu)</a></li>
                </ul>
            </nav>
        </aside>
        <section class="content-area">
            <!-- 配置编辑器核心区域 -->
            <div id="config-editor" class="card">
                <h3 data-i18n="default_title">默认模块标题</h3>
                <p class="description">这里用于显示当前选中模块的配置项。数据交互将通过POST请求进行。</p>

                <!-- 占位表单区域，由 main.js 动态填充 -->
                <form id="data-form">
                    <!-- 这里会是动态生成的下拉框、开关等组件 -->
                    <h4>需要配置项</h4>
                    <div class="form-group" data-field="setting_key">
                        <label for="setting_key">Key:</label>
                        <select id="setting_key" name="setting_key" required></select>
                    </div>
                </form>

                <button id="save-config" class="btn primary" type="button">保存配置 (POST)</button>
            </div>
        </section>
    </main>

<!-- 语言和逻辑脚本加载，确保顺序：资源JSON -> 主JS -->
<script src="./zh_cn.json"></script>
<script src="./en_us.json"></script>
<script src="./main.js" defer></script>
</body>
</html>
